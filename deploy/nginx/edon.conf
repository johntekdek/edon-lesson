# e-DON Lesson Studio — nginx site (staging/prod; spine deployment diagram).
# Install at /etc/nginx/sites-available/edon.conf, symlink into sites-enabled.
# TLS: certbot --nginx manages the certificate paths below (deploy runbook step 5).
# Replace staging.edon.example with the real hostname at apply time.

server {
    listen 80;
    listen [::]:80;
    server_name staging.edon.example;
    # certbot's HTTP-01 challenge location is managed automatically; everything else → TLS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name staging.edon.example;

    ssl_certificate /etc/letsencrypt/live/staging.edon.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.edon.example/privkey.pem;

    client_max_body_size 16m;

    location /api/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE (job progress, Story 2.5) needs buffering off on this path later;
        # revisit when the SSE endpoint lands.
    }

    # AD-9 protected-asset delivery (X-Accel-Redirect after app authz) lands with the
    # storage stories. Reserved:
    # location /_edon_assets/ {
    #     internal;
    #     alias /var/lib/edon/assets/;
    # }
}
