# Security gates (Story 1.2 AC-5, stakeholder requirement 2026-07-19; threat model S9).
# Weekly schedule: advisories arrive without commits. Hostile-user posture — see
# docs/security/threat-model.md.
name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
      - run: npm audit --audit-level=high

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # --no-emit-workspace drops local members (unauditable paths); pip-audit fails on
      # ANY known vuln — stricter than the high/critical bar, accepted. Suppressions only
      # via --ignore-vuln GHSA-… with an inline justification comment.
      - run: uv export --format requirements-txt --no-emit-workspace -o requirements-audit.txt
      - run: uvx pip-audit -r requirements-audit.txt

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker://ghcr.io/gitleaks/gitleaks:v8.30.1
        with:
          args: detect --source=. --redact --no-banner
