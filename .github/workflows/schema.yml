# Minimal CI for Story 1.1 — schema package checks only.
# Story 1.2 records the CI-provider decision formally and expands the gate set
# (no-TypeScript lint, licence audit, import-linter, budgets stub, i18n lint).
name: schema

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  js-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm test --workspace schema/js

  py-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Interim install path: the root uv lockfile lands in Story 1.2; until then
      # CI installs the py wrapper editable against the pyproject pins.
      - run: uv pip install --system -e './schema/py[dev]'
      - run: python -m pytest schema/py/tests -q
