# Dependency update automation (Story 1.2 AC-5d; threat model S9 control).
# uv ecosystem support is GA (version updates 2025-03, security updates 2025-12).
# Minor+patch grouped to bound PR noise; majors arrive individually for review.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      uv-minor-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
